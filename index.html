<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ISA RACK — Entrega / Recepción</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap');
:root{--orange:#E8571A;--dark:#1A1A1A;--gray:#3D3D3D;--mid:#888;--border:#DCDCDC;--light:#F5F5F3;--green:#22C55E;--red:#EF4444;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Barlow',sans-serif;background:#EFEFED;color:var(--dark);min-height:100vh;}

/* HEADER */
.hdr{background:var(--dark);padding:12px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(0,0,0,.4);}
.hdr-logo{display:flex;align-items:center;gap:10px;}
.hdr-logo svg{width:36px;height:36px;flex-shrink:0;}
.hdr-t h1{font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:800;color:#fff;letter-spacing:.3px;line-height:1;}
.hdr-t h1 span{color:var(--orange);}
.hdr-t p{font-size:10px;color:#aaa;letter-spacing:1.2px;text-transform:uppercase;margin-top:3px;}
.btn-gen{margin-left:auto;background:var(--orange);color:#fff;border:none;padding:10px 16px;border-radius:9px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap;box-shadow:0 4px 12px rgba(232,87,26,.4);transition:all .15s;}
.btn-gen:active{transform:scale(.95);}

/* MAIN */
.main{padding:14px;max-width:660px;margin:0 auto;padding-bottom:40px;}
.card{background:#fff;border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 1px 6px rgba(0,0,0,.06);}
.ctitle{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;color:var(--orange);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.ctitle::after{content:'';flex:1;height:1px;background:var(--border);}

/* GRID */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media(max-width:480px){.g2{grid-template-columns:1fr;}}
.fld{display:flex;flex-direction:column;gap:4px;}
.fld label{font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--gray);}
.fld input,.fld textarea{border:1.5px solid var(--border);border-radius:9px;padding:10px 12px;font-family:'Barlow',sans-serif;font-size:14px;color:var(--dark);background:#fff;transition:border-color .2s,box-shadow .2s;width:100%;}
.fld input:focus,.fld textarea:focus{outline:none;border-color:var(--orange);box-shadow:0 0 0 3px rgba(232,87,26,.1);}

/* REVISIONES */
.rev-item{padding:12px 0;border-bottom:1px solid var(--light);}
.rev-item:last-child{border-bottom:none;padding-bottom:0;}
.rev-top{display:flex;gap:10px;align-items:flex-start;}
.rev-num{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:22px;color:var(--orange);width:24px;flex-shrink:0;line-height:1;}
.rev-info{flex:1;}
.rev-punto{font-weight:700;font-size:13px;margin-bottom:2px;}
.rev-criterio{font-size:11px;color:var(--mid);line-height:1.4;}
.rev-bot{margin-top:10px;margin-left:34px;display:flex;flex-direction:column;gap:8px;}

/* TOGGLE */
.trow{display:flex;align-items:center;gap:8px;}
.trow span{font-size:11px;font-weight:600;color:var(--mid);letter-spacing:.5px;}
.tg{display:flex;border-radius:8px;overflow:hidden;border:1.5px solid var(--border);}
.tg input{display:none;}
.tg label{padding:6px 11px;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;color:var(--mid);background:#fff;user-select:none;}
.tg .csi:checked+label{background:var(--green);color:#fff;}
.tg .cno:checked+label{background:var(--red);color:#fff;}

/* DIAS */
.drow{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.drow span{font-size:11px;font-weight:600;color:var(--mid);}
.dg{display:flex;gap:4px;}
.di{display:none;}
.dl{width:30px;height:30px;border-radius:7px;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;cursor:pointer;color:var(--mid);transition:all .15s;user-select:none;}
.di:checked+.dl{background:var(--orange);border-color:var(--orange);color:#fff;}

/* ACT INPUT */
.act-in{width:100%;border:1.5px solid var(--border);border-radius:9px;padding:8px 12px;font-family:'Barlow',sans-serif;font-size:12px;color:var(--dark);background:var(--light);}
.act-in:focus{outline:none;border-color:var(--orange);background:#fff;box-shadow:0 0 0 3px rgba(232,87,26,.1);}

/* INCIDENCIAS */
.inc-item{padding:10px 0;border-bottom:1px solid var(--light);}
.inc-item:last-child{border-bottom:none;padding-bottom:0;}
.inc-nr{display:flex;align-items:center;gap:6px;margin-bottom:8px;}
.inc-n{background:var(--dark);color:#fff;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;flex-shrink:0;}
.ig{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
@media(max-width:480px){.ig{grid-template-columns:1fr;}}

/* FIRMAS */
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:480px){.fg{grid-template-columns:1fr;}}
.fbox{background:var(--light);border-radius:12px;padding:14px;}
.ftit{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--gray);margin-bottom:10px;}
.fcw{background:#fff;border-radius:10px;border:1.5px dashed var(--border);margin-top:10px;position:relative;overflow:hidden;}
.fcanvas{width:100%;height:110px;display:block;touch-action:none;cursor:crosshair;}
.flimpiar{position:absolute;top:6px;right:6px;background:rgba(0,0,0,.06);border:none;border-radius:6px;padding:4px 8px;font-size:10px;font-weight:600;cursor:pointer;color:var(--gray);}
.fhint{font-size:10px;color:var(--mid);margin-top:6px;text-align:center;}

/* MODAL */
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center;}
.mbg.show{display:flex;}
.modal{background:#fff;border-radius:20px;padding:28px 24px;max-width:340px;width:90%;text-align:center;}
.modal .ico{font-size:48px;margin-bottom:12px;}
.modal h2{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;margin-bottom:8px;}
.modal p{font-size:14px;color:var(--mid);margin-bottom:20px;line-height:1.5;}
.mbtns{display:flex;flex-direction:column;gap:8px;}
.bdl{background:var(--orange);color:#fff;border:none;padding:14px;border-radius:12px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
.bwsp{background:#25D366;color:#fff;border:none;padding:14px;border-radius:12px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
.bcer{background:var(--light);color:var(--gray);border:none;padding:12px;border-radius:12px;font-size:14px;cursor:pointer;}
</style>
</head>

// Canvas firma
function initCanvas(id){
  const cv=document.getElementById(id), ctx=cv.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  cv.width=cv.offsetWidth*dpr; cv.height=cv.offsetHeight*dpr;
  ctx.scale(dpr,dpr);
  ctx.strokeStyle='#1A1A1A'; ctx.lineWidth=2.5; ctx.lineCap='round'; ctx.lineJoin='round';
  let drawing=false;
  const pos=e=>{const r=cv.getBoundingClientRect(),s=e.touches?e.touches[0]:e;return{x:s.clientX-r.left,y:s.clientY-r.top};};
  cv.addEventListener('mousedown', e=>{drawing=true;ctx.beginPath();const p=pos(e);ctx.moveTo(p.x,p.y);});
  cv.addEventListener('mousemove', e=>{if(!drawing)return;const p=pos(e);ctx.lineTo(p.x,p.y);ctx.stroke();});
  cv.addEventListener('mouseup',   ()=>drawing=false);
  cv.addEventListener('touchstart',e=>{e.preventDefault();drawing=true;ctx.beginPath();const p=pos(e);ctx.moveTo(p.x,p.y);},{passive:false});
  cv.addEventListener('touchmove', e=>{e.preventDefault();if(!drawing)return;const p=pos(e);ctx.lineTo(p.x,p.y);ctx.stroke();},{passive:false});
  cv.addEventListener('touchend',  ()=>drawing=false);
}
function limpiar(id){const cv=document.getElementById(id);cv.getContext('2d').clearRect(0,0,cv.width,cv.height);}

window.addEventListener('load',()=>{
  initCanvas('cv_cli'); initCanvas('cv_isa');
  document.getElementById('fecha').value=new Date().toISOString().split('T')[0];
});

  // ── FIRMAS ────────────────────────────────
  const FW=UW/2-6, FBH=110, CXI=ML+FW+12;
  for(const [cx,tit,ri,pi,ci] of [[ML,'POR EL CLIENTE','resp_cli','puesto_cli','cv_cli'],[CXI,'POR ISA RACK SA','resp_isa','puesto_isa','cv_isa']]){
    doc.setFillColor(...DK); doc.rect(cx,y,FW,13,'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(8); doc.setTextColor(...WH);
    doc.text(tit,cx+FW/2,y+9,{align:'center'});
    doc.setFillColor(248,248,248); doc.setDrawColor(...MG); doc.setLineWidth(0.4);
    doc.rect(cx,y+13,FW,FBH,'FD');
    doc.setFont('helvetica','bold'); doc.setFontSize(7); doc.setTextColor(...DK);
    const rv=gv(ri), pv=gv(pi);
    doc.text('RESPONSABLE: ',cx+5,y+24); const rw=doc.getTextWidth('RESPONSABLE: ');
    doc.setFont('helvetica','normal'); if(rv)doc.text(rv,cx+5+rw,y+24,{maxWidth:FW-10-rw});
    doc.setFont('helvetica','bold'); doc.text('PUESTO: ',cx+5,y+35); const pw=doc.getTextWidth('PUESTO: ');
    doc.setFont('helvetica','normal'); if(pv)doc.text(pv,cx+5+pw,y+35,{maxWidth:FW-10-pw});
    // Área de firma con proporciones correctas
    const sigX=cx+5, sigY=y+45, sigW=FW-10, sigH=55;
    doc.setFillColor(255,255,255); doc.setDrawColor(220,220,220); doc.setLineWidth(0.4);
    doc.rect(sigX,sigY,sigW,sigH,'FD');
    // Canvas firma - mantener proporción del canvas real
    const cv2=document.getElementById(ci);
    const canvasAspect=cv2.offsetWidth/cv2.offsetHeight;
    const imgH=sigH-4;
    const imgW=Math.min(sigW-4, imgH*canvasAspect);
    const imgOffX=sigX+2+(sigW-4-imgW)/2;
    const imgData=cv2.toDataURL('image/png');
    doc.addImage(imgData,'PNG',imgOffX,sigY+2,imgW,imgH);
    // Línea firma
    doc.setDrawColor(200,200,200); doc.setLineWidth(0.5); doc.line(cx+5,y+FBH+8,cx+FW-5,y+FBH+8);
    doc.setFont('helvetica','italic'); doc.setFontSize(6.5); doc.setTextColor(180,180,180);
    doc.text('FIRMA',cx+FW/2,y+FBH+13,{align:'center'});
  }
  y+=FBH+16;

  // ── FOOTER ────────────────────────────────
  doc.setFillColor(...OR); doc.rect(ML,PH-16,UW,3,'F');
  doc.setFont('helvetica','normal'); doc.setFontSize(6.5); doc.setTextColor(...DK);
  doc.text('ISA RACK SA  —  EN SU ALMACEN, SEGURO!!!!!',PW/2,PH-6,{align:'center'});

  // OUTPUT
  const blob=doc.output('blob');
  const url=URL.createObjectURL(blob);
  const pedido=gv('pedido')||'proyecto';
  const fecha=gv('fecha')||new Date().toISOString().split('T')[0];
  const fname=`Entrega_${pedido}_${fecha}.pdf`;

  document.getElementById('btn-dl').onclick=()=>{const a=document.createElement('a');a.href=url;a.download=fname;a.click();};
  document.getElementById('btn-wsp').onclick=()=>{
    document.getElementById('btn-dl').click();
    setTimeout(()=>{
      const msg=`📋 *Entrega/Recepción ISA RACK*\nPedido: ${gv('pedido')||'-'}\nFecha: ${fmtFecha(gv('fecha'))}\nSupervisor: ${gv('supervisor')||'-'}\n\n_Adjunta el PDF descargado al chat_`;
      window.open('https://api.whatsapp.com/send?text='+encodeURIComponent(msg),'_blank');
    },600);
  };
  document.getElementById('modal').classList.add('show');
}

// Hex helpers
function drawHex(doc,cx,cy,r,color,style){
  const pts=[];
  for(let i=0;i<6;i++){const a=Math.PI/180*(60*i-30);pts.push([cx+r*Math.cos(a),cy+r*Math.sin(a)]);}
  doc.setFillColor(...color);
  doc.lines(pts.slice(1).map((p,i)=>[p[0]-pts[i][0],p[1]-pts[i][1]]),pts[0][0],pts[0][1],[1,1],style,true);
}
function drawHexHalf(doc,cx,cy,r,color){
  const pts=[];
  for(let i=0;i<6;i++){const a=Math.PI/180*(60*i-30);pts.push([cx+r*Math.cos(a),cy+r*Math.sin(a)]);}
  doc.setFillColor(...color);
  doc.lines([[pts[1][0]-pts[0][0],pts[1][1]-pts[0][1]],[pts[2][0]-pts[1][0],pts[2][1]-pts[1][1]],[pts[3][0]-pts[2][0],pts[3][1]-pts[2][1]],[cx-pts[3][0],cy-pts[3][1]],[cx-cx,cy-cy]],pts[0][0],pts[0][1],[1,1],'F',true);
}
